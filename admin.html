<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Sampana Admin

</title>

<style>

body{

background:black;

color:white;

font-family:Arial;

padding:20px;

}

.box{

max-width:500px;

margin:auto;

background:#111;

padding:25px;

border-radius:20px;

}

input,
select{

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:12px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#d4af37;

font-weight:bold;

}

textarea{

width:100%;

height:250px;

margin-top:20px;

background:black;

color:#d4af37;

padding:15px;

}

</style>

</head>

<body>

<div class="box">

<h1>

Sampana Admin

</h1>

<select id="category">

<option>

Perfumes

</option>

<option>

Body Splash

</option>

<option>

Body Spray

</option>

<option>

Chilly

</option>

</select>

<input
id="name"
placeholder="Product Name">

<input
id="old"
placeholder="Old Price">

<input
id="price"
placeholder="New Price">

<input
id="img"
placeholder="Image URL">

<button
onclick="generate()">

Generate Product Code

</button>

<textarea
id="result">

</textarea>

</div>

<script>

function generate(){

const code=

`

{

category:"${
document.getElementById("category").value
}",

name:"${
document.getElementById("name").value
}",

old:${
document.getElementById("old").value
},

price:${
document.getElementById("price").value
},

img:"${
document.getElementById("img").value
}"

},

`

document
.getElementById(
"result"
)
.value=
code

}

</script>

</body>

</html>
